<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link
      href="http://fonts.googleapis.com/css?family=Roboto"
      rel="stylesheet"
      type="text/css"
    />

    <style>
      html,
      body {
        width: 400px;
        height: 600px;
        border-radius: 10px;
        background: #fff;
        text-align: center;
        margin: 0;
        padding: 0;
        font-family: "Roboto", sans-serif;
        font-size: 12px;
        overflow: hidden;
      }

      .container {
        margin: 16px;
        height: calc(100% - 32px);
        display: flex;
        flex-direction: column;
      }

      h1 {
        color: #000;
        font-size: 16px;
        padding-bottom: 8px;
        margin: 0 !important;
      }

      .btn {
        display: block;
        height: 40px;
        -webkit-border-radius: 4px;
        -moz-border-radius: 4px;
        border-radius: 4px;
        text-decoration: none;
        line-height: 40px;
        font-size: 14px;
        margin-bottom: 8px;
        cursor: pointer;
      }

      .btn.primary {
        background: #2c4bff;
        color: #fff;
      }

      .btn.secondary {
        border: 1px solid #b8b8b8;
        color: #636363;
      }

      .chat-container {
        display: none;
        flex: 1;
        border: 1px solid #b8b8b8;
        border-radius: 4px;
        padding: 12px;
        margin: 8px 0;
        overflow-y: auto;
        background: #f8f9fa;
      }

      .chat-message {
        margin-bottom: 8px;
        padding: 8px 12px;
        border-radius: 4px;
        font-size: 12px;
        max-width: 80%;
        word-wrap: break-word;
      }

      .user-message {
        background-color: #e3f2fd;
        margin-left: auto;
      }

      .ai-message {
        background-color: #fff;
        margin-right: auto;
        border: 1px solid #e0e0e0;
      }

      .input-container {
        display: none;
        margin-top: 8px;
      }

      .message-input {
        width: 100%;
        height: 60px;
        padding: 8px;
        border: 1px solid #b8b8b8;
        border-radius: 4px;
        margin-bottom: 8px;
        box-sizing: border-box;
        resize: none;
        font-family: inherit;
      }

      .send-button {
        background: #2c4bff;
        color: #fff;
        border: none;
        padding: 8px 16px;
        border-radius: 4px;
        cursor: pointer;
        font-size: 12px;
        width: 100%;
      }

      .send-button:hover {
        background: #1a3ad9;
      }

      .buffer {
        background: url("buffer-logo.svg") no-repeat;
        width: 50px;
        height: 12px;
        display: block;
        margin-top: 8px;
      }
    </style>
  </head>

  <body>
    <div class="container">
      <h1>What would you like to do?</h1>
      <a href="#" class="btn primary" id="create-post">Create Post</a>
      <a href="#" class="btn secondary" id="create-idea">Save Idea</a>
      <a href="#" class="btn secondary" id="brainstorm-ai">Brainstorm with AI</a>
      
      <div id="chat-container" class="chat-container"></div>
      <div id="input-container" class="input-container">
        <textarea id="message-input" class="message-input" placeholder="Type your message..."></textarea>
        <button id="send-button" class="send-button">Send</button>
      </div>

      <a href="https://publish.buffer.com" target="_blank" class="buffer"></a>
    </div>

    <script src="jquery-3.6.0.min.js"></script>
    <script src="popup.js"></script>
  </body>
</html>
